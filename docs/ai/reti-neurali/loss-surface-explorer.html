<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loss Surface Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c16;color:#e2e8f0;font-family:'DM Mono',monospace;height:100vh;display:flex;flex-direction:column;padding:14px 16px;overflow:hidden}
.header{text-align:center;margin-bottom:10px}
.header h1{font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#38bdf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:10px;color:#475569;margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.main{display:flex;flex:1;gap:10px;min-height:0}
.left-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;min-height:0}
.right-col{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
.panel{background:#0f1629;border-radius:10px;border:1px solid #1e293b;padding:10px;display:flex;flex-direction:column;flex-shrink:0}
.panel-header{font-size:9px;font-weight:600;letter-spacing:.15em;color:#475569;margin-bottom:6px}
.input-row{display:flex;gap:4px;margin-bottom:6px}
.input-row input{flex:1;background:#0a0e1a;border:1px solid #1e293b;border-radius:4px;color:#e2e8f0;padding:5px 6px;font-size:11px;font-family:'DM Mono',monospace;outline:none;width:0}
.input-row input:focus{border-color:#334155}
.add-btn{background:linear-gradient(135deg,#0ea5e9,#22d3ee);border:none;border-radius:4px;color:#080c16;font-size:15px;font-weight:700;width:30px;cursor:pointer}
.add-btn:hover{opacity:.85}
.points-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin-bottom:6px;max-height:140px}
.point-item{display:flex;justify-content:space-between;align-items:center;background:#0a0e1a;border-radius:4px;padding:3px 7px;font-size:10px;color:#94a3b8}
.remove-btn{background:none;border:none;color:#ef4444;font-size:13px;cursor:pointer;padding:0 2px}
.reset-btn{background:transparent;border:1px solid #1e293b;border-radius:4px;color:#475569;padding:4px 0;font-size:9px;cursor:pointer;font-family:'DM Mono',monospace}
.reset-btn:hover{border-color:#334155;color:#94a3b8}
.empty-msg{color:#334155;font-size:9px;text-align:center;padding:12px;line-height:1.5}
.viz-card{flex:1;position:relative;background:#0b1020;border-radius:10px;border:1px solid #1e293b;overflow:hidden;min-height:0}
.viz-card canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#canvas3d{cursor:grab}
#canvasHeatmap{cursor:crosshair}
.viz-label{position:absolute;bottom:6px;left:10px;font-size:8px;color:#334155;letter-spacing:.1em;z-index:2;pointer-events:none}
.hint{position:absolute;bottom:6px;right:10px;font-size:8px;color:#1e293b;letter-spacing:.05em;z-index:2;pointer-events:none}
.legend{position:absolute;top:8px;right:10px;display:flex;align-items:center;gap:5px;z-index:2;pointer-events:none}
.legend-bar{width:60px;height:6px;border-radius:3px;background:linear-gradient(90deg,rgb(15,30,80),rgb(0,140,160),rgb(40,200,120),rgb(240,180,30),rgb(220,40,40))}
.legend span{font-size:7px;color:#475569}
.info-panel{position:absolute;top:8px;left:10px;display:flex;flex-direction:column;gap:3px;z-index:2;pointer-events:none}
.info-badge{background:rgba(10,14,26,.88);border:1px solid #1e293b;border-radius:5px;padding:2px 7px;display:flex;flex-direction:column}
.info-label{font-size:7px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.info-val{font-size:11px;color:#38bdf8;font-weight:500}
.info-val-g{font-size:11px;color:#34d399;font-weight:500}
</style>
</head>
<body>
<div class="header">
  <h1>Loss Surface Explorer</h1>
  <p>Regressione Lineare &mdash; Minimi Quadrati &mdash; &#375; = mx + q</p>
</div>
<div class="main">
  <div class="left-col">
    <div class="panel">
      <div class="panel-header">DATI</div>
      <div class="input-row">
        <input type="number" id="inX" placeholder="x">
        <input type="number" id="inY" placeholder="y">
        <button class="add-btn" id="addBtn">+</button>
      </div>
      <div class="points-list" id="pointsList"></div>
      <button class="reset-btn" id="resetBtn">Reset Demo</button>
    </div>
    <div class="viz-card">
      <canvas id="canvasScatter"></canvas>
      <div class="viz-label">PUNTI &amp; RETTA</div>
    </div>
  </div>
  <div class="right-col">
    <div class="viz-card">
      <canvas id="canvas3d"></canvas>
      <div class="legend"><span>basso</span><div class="legend-bar"></div><span>alto</span></div>
      <div class="info-panel" id="infoPanel"></div>
      <div class="viz-label">SUPERFICIE 3D</div>
      <div class="hint">Trascina per ruotare</div>
    </div>
    <div class="viz-card">
      <canvas id="canvasHeatmap"></canvas>
      <div class="viz-label">PIANO DOMINIO (m, q)</div>
      <div class="hint">Muovi il mouse per esplorare</div>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────
var points = [
  {x:0.5,y:3.2},{x:1.8,y:2.1},{x:2.5,y:5.8},{x:3.1,y:4.3},
  {x:4.4,y:7.6},{x:5.0,y:6.1},{x:6.2,y:9.4},{x:7.5,y:8.0}
];
var rotation = -0.65, tilt = -0.55;
var hoverCell = null, hoverMQ = null;
var heatmapLayout = null;
var dragging = false, lastX = 0, lastY = 0;

// ── HELPERS ──────────────────────────────────────────────────────
function computeLoss(pts, mR, qR, res) {
  var n = pts.length;
  if (!n) return {grid:[],min:0,max:1,bestM:0,bestQ:0,bestLoss:1/0};
  var grid = [], mn=1/0, mx=-1/0, bM=0, bQ=0, bL=1/0;
  for (var i=0;i<=res;i++){
    var row=[], m=mR[0]+(mR[1]-mR[0])*(i/res);
    for (var j=0;j<=res;j++){
      var q=qR[0]+(qR[1]-qR[0])*(j/res), l=0;
      for(var k=0;k<pts.length;k++){var e=pts[k].y-(m*pts[k].x+q);l+=e*e;} l/=n;
      row.push(l);
      if(l<mn)mn=l; if(l>mx)mx=l;
      if(l<bL){bL=l;bM=m;bQ=q;}
    }
    grid.push(row);
  }
  return {grid:grid,min:mn,max:mx,bestM:bM,bestQ:bQ,bestLoss:bL};
}

function lerpColor(t){
  var s=[[0,[15,30,80]],[.25,[0,140,160]],[.5,[40,200,120]],[.75,[240,180,30]],[1,[220,40,40]]];
  for(var i=0;i<s.length-1;i++) if(t<=s[i+1][0]){
    var f=(t-s[i][0])/(s[i+1][0]-s[i][0]);
    return [Math.round(s[i][1][0]+f*(s[i+1][1][0]-s[i][1][0])),
            Math.round(s[i][1][1]+f*(s[i+1][1][1]-s[i][1][1])),
            Math.round(s[i][1][2]+f*(s[i+1][1][2]-s[i][1][2]))];
  }
  return s[s.length-1][1];
}

function getRanges(pts){
  if(pts.length<2) return {mR:[-2,5],qR:[-5,8]};
  var xs=pts.map(function(p){return p.x;}),ys=pts.map(function(p){return p.y;});
  var xn=Math.min.apply(null,xs),xx=Math.max.apply(null,xs),yn=Math.min.apply(null,ys),yx=Math.max.apply(null,ys);
  var xr=xx-xn||1, sg=(yx-yn)/xr, pd=Math.max(Math.abs(sg)*1.5,3);
  var ig=yn-sg*xn, pQ=Math.max(Math.abs(ig)*1.5,5);
  return {mR:[sg-pd,sg+pd],qR:[ig-pQ,ig+pQ]};
}

function setupCanvas(canvas){
  var dpr=window.devicePixelRatio||1, r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr; canvas.height=r.height*dpr;
  var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  return {ctx:ctx,W:r.width,H:r.height};
}

// ── 3D RENDERER ──────────────────────────────────────────────────
function draw3D(){
  if(!points.length) return;
  var s=setupCanvas(document.getElementById('canvas3d')), ctx=s.ctx, W=s.W, H=s.H;
  var rng0=getRanges(points), mR=rng0.mR, qR=rng0.qR;
  var RES=60, data=computeLoss(points,mR,qR,RES);
  var grid=data.grid, min=data.min, max=data.max, bestM=data.bestM, bestQ=data.bestQ;
  var res=grid.length-1; if(res<=0)return;

  var cR=Math.cos(rotation),sR=Math.sin(rotation),cT=Math.cos(tilt),sT=Math.sin(tilt);
  var sc=Math.min(W,H)*.32;
  var lm=Math.log(min+1),lx=Math.log(max+1),rng=lx-lm||1;

  function proj(mx,qx,loss){
    var x3=(mx-.5)*2,z3=(qx-.5)*2,y3=((Math.log(loss+1)-lm)/rng)*1.4;
    var rx=x3*cR-z3*sR,rz=x3*sR+z3*cR;
    return [W/2+rx*sc, H/2-(y3*cT-rz*sT)*sc, y3*sT+rz*cT];
  }

  ctx.strokeStyle='rgba(100,116,139,0.18)';ctx.lineWidth=.6;
  for(var k=0;k<=10;k++){
    var t=k/10;
    var a=proj(t,0,min),b=proj(t,1,min);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
    a=proj(0,t,min);b=proj(1,t,min);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
  }

  var quads=[];
  for(var i=0;i<res;i++)for(var j=0;j<res;j++){
    var mi=i/res,mj=j/res,mi1=(i+1)/res,mj1=(j+1)/res;
    var v00=proj(mi,mj,grid[i][j]),v10=proj(mi1,mj,grid[i+1][j]);
    var v11=proj(mi1,mj1,grid[i+1][j+1]),v01=proj(mi,mj1,grid[i][j+1]);
    var az=(v00[2]+v10[2]+v11[2]+v01[2])/4;
    var al=(grid[i][j]+grid[i+1][j]+grid[i+1][j+1]+grid[i][j+1])/4;
    var t2=(Math.log(al+1)-lm)/rng;
    var mapped=null;
    if(hoverCell){var hi=Math.floor(hoverCell.mi*RES),hj=Math.floor(hoverCell.mj*RES);mapped={i:Math.min(hi,RES-1),j:Math.min(hj,RES-1)};}
    var isH=mapped&&mapped.i===i&&mapped.j===j;
    quads.push({pts:[v00,v10,v11,v01],z:az,t:t2,isH:isH});
  }
  quads.sort(function(a,b){return a.z-b.z;});
  for(var qi=0;qi<quads.length;qi++){
    var q=quads[qi];
    var c=lerpColor(q.t);
    ctx.beginPath();ctx.moveTo(q.pts[0][0],q.pts[0][1]);
    for(var k2=1;k2<4;k2++)ctx.lineTo(q.pts[k2][0],q.pts[k2][1]);
    ctx.closePath();
    ctx.fillStyle=q.isH?'rgba(255,255,255,0.35)':'rgb('+c[0]+','+c[1]+','+c[2]+')';
    ctx.fill();
    ctx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.4)';ctx.lineWidth=.5;ctx.stroke();
  }

  if(hoverCell){
    var hi2=Math.floor(hoverCell.mi*RES),hj2=Math.floor(hoverCell.mj*RES);
    var ci=Math.min(hi2,RES-1),cj=Math.min(hj2,RES-1);
    var ni=(ci+.5)/res,nj=(cj+.5)/res;
    var hL=grid[ci]?grid[ci][cj]||min:min;
    var top=proj(ni,nj,hL),bot=proj(ni,nj,min);
    ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(top[0],top[1]);ctx.lineTo(bot[0],bot[1]);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(top[0],top[1],4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
  }

  var bi=(bestM-mR[0])/(mR[1]-mR[0]),bj=(bestQ-qR[0])/(qR[1]-qR[0]);
  var bp=proj(bi,bj,data.bestLoss);
  ctx.beginPath();ctx.arc(bp[0],bp[1],5,0,Math.PI*2);
  ctx.fillStyle='#34d399';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();

  ctx.font="bold 11px 'DM Mono',monospace";ctx.fillStyle='#64748b';ctx.textAlign='center';
  var l=proj(0,-.07,min);ctx.fillText('m='+mR[0].toFixed(1),l[0],l[1]+14);
  l=proj(1,-.07,min);ctx.fillText('m='+mR[1].toFixed(1),l[0],l[1]+14);
  l=proj(-.07,0,min);ctx.fillText('q='+qR[0].toFixed(1),l[0],l[1]+14);
  l=proj(-.07,1,min);ctx.fillText('q='+qR[1].toFixed(1),l[0],l[1]+14);

  var ip=document.getElementById('infoPanel');
  ip.innerHTML='<div class="info-badge"><span class="info-label">Ottimo</span><span class="info-val">m='+bestM.toFixed(3)+' q='+bestQ.toFixed(3)+'</span></div>'
    +'<div class="info-badge"><span class="info-label">MSE min</span><span class="info-val-g">'+data.bestLoss.toFixed(4)+'</span></div>';
}

// ── HEATMAP RENDERER ─────────────────────────────────────────────
function drawHeatmap(hover){
  if(!points.length) return;
  var s=setupCanvas(document.getElementById('canvasHeatmap')),ctx=s.ctx,W=s.W,H=s.H;
  var rng0=getRanges(points),mR=rng0.mR,qR=rng0.qR;
  var RES=80,data=computeLoss(points,mR,qR,RES);
  var grid=data.grid,min=data.min,max=data.max,bestM=data.bestM,bestQ=data.bestQ;
  var res=grid.length-1; if(res<=0)return;

  var pad={left:44,right:12,top:12,bottom:32};
  var gw=W-pad.left-pad.right,gh=H-pad.top-pad.bottom;
  var lm=Math.log(min+1),lx=Math.log(max+1),rng=lx-lm||1;

  var cw=gw/(res+1),ch=gh/(res+1);
  for(var i=0;i<=res;i++)for(var j=0;j<=res;j++){
    var t=(Math.log(grid[i][j]+1)-lm)/rng;
    var c=lerpColor(t);
    ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
    ctx.fillRect(pad.left+i*cw,pad.top+(res-j)*ch,cw+.5,ch+.5);
  }

  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=.5;
  for(var k=0;k<=10;k++){
    var xp=pad.left+(k/10)*gw,yp=pad.top+(k/10)*gh;
    ctx.beginPath();ctx.moveTo(xp,pad.top);ctx.lineTo(xp,pad.top+gh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,yp);ctx.lineTo(pad.left+gw,yp);ctx.stroke();
  }

  var bx=pad.left+((bestM-mR[0])/(mR[1]-mR[0]))*gw;
  var by=pad.top+(1-(bestQ-qR[0])/(qR[1]-qR[0]))*gh;
  ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.strokeStyle='#34d399';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(bx,by,2,0,Math.PI*2);ctx.fillStyle='#34d399';ctx.fill();

  ctx.font="10px 'DM Mono',monospace";ctx.fillStyle='#64748b';ctx.textAlign='center';
  for(var k2=0;k2<=4;k2++) ctx.fillText((mR[0]+(mR[1]-mR[0])*(k2/4)).toFixed(1),pad.left+(k2/4)*gw,pad.top+gh+13);
  ctx.fillStyle='#94a3b8';ctx.font="bold 10px 'DM Mono',monospace";
  ctx.fillText('m',pad.left+gw/2,pad.top+gh+26);
  ctx.save();ctx.translate(10,pad.top+gh/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText('q',0,0);ctx.restore();
  ctx.font="10px 'DM Mono',monospace";ctx.fillStyle='#64748b';
  for(var k3=0;k3<=4;k3++){var v=qR[0]+(qR[1]-qR[0])*(k3/4);ctx.textAlign='right';ctx.fillText(v.toFixed(1),pad.left-5,pad.top+(1-k3/4)*gh+4);}

  if(hover){
    var hx=pad.left+((hover.m-mR[0])/(mR[1]-mR[0]))*gw;
    var hy=pad.top+(1-(hover.q-qR[0])/(qR[1]-qR[0]))*gh;
    ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(hx,pad.top);ctx.lineTo(hx,pad.top+gh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,hy);ctx.lineTo(pad.left+gw,hy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#080c16';ctx.lineWidth=2;ctx.stroke();

    var lines=['m='+hover.m.toFixed(3),'q='+hover.q.toFixed(3),'MSE='+hover.loss.toFixed(4)];
    ctx.font="bold 10px 'DM Mono',monospace";
    var tw=Math.max(ctx.measureText(lines[0]).width,ctx.measureText(lines[1]).width,ctx.measureText(lines[2]).width)+16;
    var tx=hx+12,ty=hy-26;if(tx+tw>W-4)tx=hx-tw-12;if(ty<4)ty=hy+14;
    ctx.fillStyle='rgba(8,12,22,0.94)';ctx.beginPath();ctx.roundRect(tx,ty,tw,48,5);ctx.fill();
    ctx.strokeStyle='rgba(52,211,153,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.textAlign='left';
    var colors=['#38bdf8','#a78bfa','#34d399'];
    for(var li=0;li<3;li++){ctx.fillStyle=colors[li];ctx.fillText(lines[li],tx+8,ty+14+li*13);}
  }

  heatmapLayout={pad:pad,gw:gw,gh:gh,mR:mR,qR:qR};
}

// ── SCATTER RENDERER ─────────────────────────────────────────────
function drawScatter(){
  if(!points.length) return;
  var s=setupCanvas(document.getElementById('canvasScatter')),ctx=s.ctx,W=s.W,H=s.H;
  var rng0=getRanges(points),mR=rng0.mR,qR=rng0.qR;
  var best=computeLoss(points,mR,qR,80),bestM=best.bestM,bestQ=best.bestQ;

  var pad={left:40,right:16,top:16,bottom:32};
  var gw=W-pad.left-pad.right,gh=H-pad.top-pad.bottom;
  var xs=points.map(function(p){return p.x;}),ys=points.map(function(p){return p.y;});
  var xPd=(Math.max.apply(null,xs)-Math.min.apply(null,xs))*.15||1;
  var yPd=(Math.max.apply(null,ys)-Math.min.apply(null,ys))*.2||1;
  var xMin=Math.min.apply(null,xs)-xPd,xMax=Math.max.apply(null,xs)+xPd;
  var yMin=Math.min.apply(null,ys)-yPd,yMax=Math.max.apply(null,ys)+yPd;

  function toS(x,y){return [pad.left+((x-xMin)/(xMax-xMin))*gw, pad.top+(1-(y-yMin)/(yMax-yMin))*gh];}

  ctx.strokeStyle='rgba(100,116,139,0.12)';ctx.lineWidth=.5;
  for(var k=0;k<=8;k++){
    var xp=pad.left+(k/8)*gw,yp=pad.top+(k/8)*gh;
    ctx.beginPath();ctx.moveTo(xp,pad.top);ctx.lineTo(xp,pad.top+gh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.left,yp);ctx.lineTo(pad.left+gw,yp);ctx.stroke();
  }

  ctx.font="9px 'DM Mono',monospace";ctx.fillStyle='#475569';ctx.textAlign='center';
  for(var k2=0;k2<=4;k2++) ctx.fillText((xMin+(xMax-xMin)*(k2/4)).toFixed(1),pad.left+(k2/4)*gw,pad.top+gh+12);
  ctx.fillStyle='#94a3b8';ctx.font="bold 9px 'DM Mono',monospace";
  ctx.fillText('x',pad.left+gw/2,pad.top+gh+25);
  ctx.save();ctx.translate(10,pad.top+gh/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText('y',0,0);ctx.restore();
  ctx.font="9px 'DM Mono',monospace";ctx.fillStyle='#475569';
  for(var k3=0;k3<=4;k3++){var v=yMin+(yMax-yMin)*(k3/4);ctx.textAlign='right';ctx.fillText(v.toFixed(1),pad.left-5,pad.top+(1-k3/4)*gh+3);}

  // clipping
  ctx.save();ctx.beginPath();ctx.rect(pad.left,pad.top,gw,gh);ctx.clip();

  // optimal line
  var oA=toS(xMin,bestM*xMin+bestQ),oB=toS(xMax,bestM*xMax+bestQ);
  ctx.strokeStyle='rgba(52,211,153,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(oA[0],oA[1]);ctx.lineTo(oB[0],oB[1]);ctx.stroke();
  ctx.setLineDash([]);

  // hover line
  if(hoverMQ){
    var hA=toS(xMin,hoverMQ.m*xMin+hoverMQ.q),hB=toS(xMax,hoverMQ.m*xMax+hoverMQ.q);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(hA[0],hA[1]);ctx.lineTo(hB[0],hB[1]);ctx.stroke();
    ctx.strokeStyle='rgba(239,68,68,0.5)';ctx.lineWidth=1;
    for(var ri=0;ri<points.length;ri++){
      var ps=toS(points[ri].x,points[ri].y),pp=toS(points[ri].x,hoverMQ.m*points[ri].x+hoverMQ.q);
      ctx.beginPath();ctx.moveTo(ps[0],ps[1]);ctx.lineTo(pp[0],pp[1]);ctx.stroke();
    }
  }

  // data points
  for(var pi=0;pi<points.length;pi++){
    var sp=toS(points[pi].x,points[pi].y);
    ctx.beginPath();ctx.arc(sp[0],sp[1],5,0,Math.PI*2);
    ctx.fillStyle='#38bdf8';ctx.fill();ctx.strokeStyle='#0a0e1a';ctx.lineWidth=1.5;ctx.stroke();
  }

  ctx.restore();

  if(hoverMQ){
    ctx.font="bold 10px 'DM Mono',monospace";ctx.fillStyle='#f59e0b';ctx.textAlign='left';
    ctx.fillText('y = '+hoverMQ.m.toFixed(2)+'x '+(hoverMQ.q>=0?'+ ':'- ')+Math.abs(hoverMQ.q).toFixed(2),pad.left+4,pad.top+12);
    ctx.fillStyle='rgba(239,68,68,0.7)';ctx.font="9px 'DM Mono',monospace";
    ctx.fillText('MSE = '+hoverMQ.loss.toFixed(4),pad.left+4,pad.top+25);
  } else {
    ctx.font="bold 10px 'DM Mono',monospace";ctx.fillStyle='rgba(52,211,153,0.6)';ctx.textAlign='left';
    ctx.fillText('y\u0302 = '+bestM.toFixed(2)+'x '+(bestQ>=0?'+ ':'- ')+Math.abs(bestQ).toFixed(2)+'  (ottimo)',pad.left+4,pad.top+12);
  }
}

// ── DRAW ALL ─────────────────────────────────────────────────────
function drawAll(){draw3D();drawHeatmap(hoverMQ);drawScatter();}

// ── POINTS UI ────────────────────────────────────────────────────
function renderPoints(){
  var el=document.getElementById('pointsList');
  if(!points.length){el.innerHTML='<div class="empty-msg">Aggiungi punti</div>';return;}
  el.innerHTML=points.map(function(p,i){return '<div class="point-item"><span>('+p.x+', '+p.y+')</span><button class="remove-btn" data-i="'+i+'">×</button></div>';}).join('');
  var btns=el.querySelectorAll('.remove-btn');
  for(var i=0;i<btns.length;i++) btns[i].onclick=function(){points.splice(+this.dataset.i,1);renderPoints();drawAll();};
}

function addPoint(){
  var x=parseFloat(document.getElementById('inX').value),y=parseFloat(document.getElementById('inY').value);
  if(isNaN(x)||isNaN(y))return;
  points.push({x:x,y:y});
  document.getElementById('inX').value='';document.getElementById('inY').value='';
  renderPoints();drawAll();
}

document.getElementById('addBtn').onclick=addPoint;
var inputs=document.querySelectorAll('.input-row input');
for(var ii=0;ii<inputs.length;ii++) inputs[ii].onkeydown=function(e){if(e.key==='Enter')addPoint();};
document.getElementById('resetBtn').onclick=function(){
  points=[{x:.5,y:3.2},{x:1.8,y:2.1},{x:2.5,y:5.8},{x:3.1,y:4.3},{x:4.4,y:7.6},{x:5,y:6.1},{x:6.2,y:9.4},{x:7.5,y:8}];
  renderPoints();drawAll();
};

// ── 3D DRAG ──────────────────────────────────────────────────────
var c3d=document.getElementById('canvas3d');
c3d.onpointerdown=function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;c3d.setPointerCapture(e.pointerId);};
c3d.onpointermove=function(e){if(!dragging)return;rotation+=(e.clientX-lastX)*.008;tilt=Math.max(-1.2,Math.min(1.2,tilt+(e.clientY-lastY)*.008));lastX=e.clientX;lastY=e.clientY;draw3D();};
c3d.onpointerup=function(){dragging=false;};

// ── HEATMAP HOVER ────────────────────────────────────────────────
var cHm=document.getElementById('canvasHeatmap');
cHm.onmousemove=function(e){
  var L=heatmapLayout;if(!L)return;
  var r=cHm.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  var mi=(mx-L.pad.left)/L.gw, qi=1-(my-L.pad.top)/L.gh;
  if(mi<0||mi>1||qi<0||qi>1){hoverCell=null;hoverMQ=null;drawAll();return;}
  var m=L.mR[0]+mi*(L.mR[1]-L.mR[0]), q=L.qR[0]+qi*(L.qR[1]-L.qR[0]);
  var loss=0;for(var k=0;k<points.length;k++){var err=points[k].y-(m*points[k].x+q);loss+=err*err;}loss/=points.length;
  hoverCell={mi:mi,mj:qi};hoverMQ={m:m,q:q,loss:loss};
  drawAll();
};
cHm.onmouseleave=function(){hoverCell=null;hoverMQ=null;drawAll();};

// ── INIT ─────────────────────────────────────────────────────────
renderPoints();
drawAll();
window.onresize=drawAll;
</script>
</body>
</html>
